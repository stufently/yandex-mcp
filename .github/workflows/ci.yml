name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  test:
    name: Test packages
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package:
          - yandex-search-mcp
          - yandex-wordstat-mcp
          - yandex-webmaster-mcp
          - yandex-metrika-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package loads
        run: node --input-type=module -e "await import('./packages/${{ matrix.package }}/src/index.mjs')" &
        env:
          YANDEX_METRIKA_TOKEN: test
          YANDEX_WORDSTAT_TOKEN: test
          YANDEX_WEBMASTER_TOKEN: test
          YANDEX_SEARCH_USER: test
          YANDEX_SEARCH_KEY: test
